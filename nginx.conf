server {
    listen 80;
    root /usr/share/nginx/html;

    # Legacy slug → renamed section. Server-side 301 (SEO-grade); the old /tech-stack
    # route is no longer generated, so this keeps shared links working.
    location = /tech-stack  { return 301 /capabilities/; }
    location = /tech-stack/ { return 301 /capabilities/; }

    # Static export (trailingSlash: true). Resolve, in order: an exact file, a pretty
    # `.html`, then the directory's index.html (referenced explicitly so we don't depend
    # on directory-index resolution) — otherwise a real 404 (NOT an index.html SPA
    # fallback, so bogus paths return 404 instead of silently 200-ing as the home page).
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Styled 404 (Next.js `not-found` exported to 404.html), served with a 404 status.
    error_page 404 /404.html;

    # Cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
