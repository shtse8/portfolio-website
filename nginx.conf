server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Legacy slug → renamed section. Server-side 301 (SEO-grade); the old /tech-stack
    # route is no longer generated, so this keeps shared links working.
    location = /tech-stack  { return 301 /capabilities/; }
    location = /tech-stack/ { return 301 /capabilities/; }

    # Static site: try the exact file, the section directory (its index.html), then the
    # pretty-URL .html — and finally a real 404 (NOT an index.html SPA fallback, so bogus
    # paths return 404 instead of silently 200-ing as the home page).
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404 page (Next.js `not-found` exported to 404.html)
    error_page 404 /404.html;

    # Cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
