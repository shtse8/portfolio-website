version = "1"

[project]
name = "portfolio-website"
slug = "portfolio-website"
org = "shtse8"

[build]
strategy = "dockerfile"
dockerfile = "Dockerfile"
context = "."

[[services]]
name = "web"
type = "web"
port = 3000
watch_paths = ["src/**", "public/**", "package.json", "nginx.conf", "Dockerfile"]

[[services]]
name = "api"
type = "web"
port = 3001
watch_paths = ["api/**"]

[services.build]
strategy = "dockerfile"
dockerfile = "api/Dockerfile"
context = "api"

[services.health]
path = "/healthz"
